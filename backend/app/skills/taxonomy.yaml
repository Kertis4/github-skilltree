# GitHub SkillTree — canonical skill graph (single source of truth).
#
# ONE directed acyclic graph. Three overlays on it:
#   * kind   — hard (a technology) vs concept (a conceptual/paradigm skill)
#   * domain — visual grouping (colour + radar axis)
#   * tracks — weighted career-path affinity (0..1); a "track" is a filtered,
#              topologically-ordered VIEW of this same graph ("same tree,
#              different paths"). Fullstack ≈ the union of frontend + backend.
#
# Two consumers read this file:
#   * detection (detectors/worker) reads each skill's `detection` block
#   * the skill-tree / radar viz reads `graph.requires`, `domain` and `tracks`
#
# `requires` is SOFT ordering (recommended order + "learn next" quests) — it
# never locks a node. Validated on load (see models.py): acyclic + all refs resolve.
#
# v1 = a deep vertical slice of two tracks: BACKEND + FRONTEND (+ shared
# foundation). Other tracks (infrastructure/systems/mobile) are declared so
# affinities can reference them, and will be populated in a later phase.

version: "0.1.0-slice"

# ── Tracks: the six career pathways (colour = palette name mapped by the UI) ──
tracks:
  - id: frontend
    label: Frontend
    color: cyan
    icon: code
    blurb: Building user interfaces — markup, components, state and the browser platform.
  - id: fullstack
    label: Fullstack
    color: green
    icon: tree
    blurb: End-to-end product work spanning the UI, the API and the data beneath it.
  - id: backend
    label: Backend
    color: magenta
    icon: terminal
    blurb: Services, APIs, data and the logic that powers them.
  - id: infrastructure
    label: Infrastructure
    color: amber
    icon: cpu
    blurb: How code ships and runs — containers, pipelines and infrastructure-as-code.
  - id: systems
    label: Systems
    color: purple
    icon: bolt
    blurb: Lower-level and performance-sensitive work — memory, concurrency, protocols.
  - id: mobile
    label: Mobile
    color: red
    icon: radar
    blurb: Native and cross-platform apps for phones and tablets.

# ── Domains: ~8 visual groupings (colour + radar axes) ──
domains:
  - id: languages
    label: Languages
    color: cyan
    icon: code
  - id: paradigms
    label: Paradigms
    color: magenta
    icon: sparkles
  - id: frameworks
    label: Frameworks
    color: purple
    icon: bolt
  - id: architecture
    label: Architecture
    color: green
    icon: tree
  - id: build-tooling
    label: Build & Tooling
    color: amber
    icon: cpu
  - id: data
    label: Data
    color: blue
    icon: terminal
  - id: quality
    label: Quality
    color: accent
    icon: shield
  - id: infrastructure
    label: Infrastructure
    color: red
    icon: radar

